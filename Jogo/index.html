<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Nosso Momento ❤️</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="hearts"></div>
<div class="container">
  <h1>Monte nossa foto ❤️</h1>
  <div id="tempo">⏱️ 0s</div>
  <button onclick="iniciar()">🔄 Embaralhar</button>
  <div id="puzzle"></div>
</div>

<!-- sons -->
<audio id="clickSound" src="click.mp3"></audio>
<audio id="winSound" src="win.mp3"></audio>

<script>
  const heartsContainer = document.querySelector(".hearts");
  const emojis = ["💙", "💚", "💜", "💛", "💝", "🧩"];

setInterval(() => {
  const heart = document.createElement("div");
  heart.classList.add("heart-bg");

  heart.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (12 + Math.random() * 20) + "px";
  heart.style.animationDuration = (4 + Math.random() * 4) + "s";

  heartsContainer.appendChild(heart);

  setTimeout(() => heart.remove(), 8000);
}, 900);


const puzzle = document.getElementById("puzzle");
const tempoEl = document.getElementById("tempo");

const imagens = [
  "foto1.jpg",
  "foto2.jpg",
  "foto3.jpg",
  "foto4.jpg",
  "foto5.jpg",
  "foto6.jpg",
  "foto7.jpg"
];

let indiceAtual = 0;
let size = 5;
let timer = 0;
let intervalo;

const clickSound = document.getElementById("clickSound");
const winSound = document.getElementById("winSound");

function iniciar() {
  puzzle.innerHTML = "";
  timer = 0;
  clearInterval(intervalo);

  intervalo = setInterval(() => {
    timer++;
    tempoEl.innerText = `⏱️ ${timer}s`;
  }, 1000);

  let imagemAtual = imagens[indiceAtual];

  let pieces = [];

  for (let i = 0; i < size * size; i++) {
    let piece = document.createElement("div");
    piece.className = "piece";

    let x = i % size;
    let y = Math.floor(i / size);

    piece.style.backgroundImage = `url(${imagemAtual})`;
    piece.dataset.pos = `${x}-${y}`;
    piece.style.backgroundPosition =
  `${(x * 100)/(size - 1)}% ${(y * 100)/(size - 1)}%`;

    piece.setAttribute("draggable", true);
    pieces.push(piece);
  }

  pieces.sort(() => Math.random() - 0.5);
  pieces.forEach(p => puzzle.appendChild(p));

  let dragged;

  document.querySelectorAll(".piece").forEach(piece => {

    piece.addEventListener("dragstart", () => dragged = piece);
    piece.addEventListener("dragover", e => e.preventDefault());

    piece.addEventListener("drop", () => {
      if (dragged !== piece) {

        clickSound.currentTime = 0;
        clickSound.play().catch(()=>{});

        piece.classList.add("anim");
        dragged.classList.add("anim");

        setTimeout(() => {
          let temp = piece.style.backgroundPosition;
          piece.style.backgroundPosition = dragged.style.backgroundPosition;
          dragged.style.backgroundPosition = temp;

          piece.classList.remove("anim");
          dragged.classList.remove("anim");

          verificar();
        }, 120);
      }
    });
  });
}

function verificar() {
  let correta = true;

  const pieces = document.querySelectorAll(".piece");

 pieces.forEach((piece, i) => {

  let x = i % size;
  let y = Math.floor(i / size);

  let corretaPos = `${x}-${y}`;

  if (piece.dataset.pos !== corretaPos) {
    correta = false;
  }

});
``

  if (correta === true) {
    clearInterval(intervalo);

    winSound.play().catch(()=>{});

    setTimeout(() => {
      let overlay = document.createElement("div");
      overlay.className = "overlay-final";

      overlay.innerHTML = `
        <div class="final-content">
          <div class="imagem-final"
              style="background-image: url(${imagens[indiceAtual]});">
          </div>

          <h2>Nosso momento ❤️</h2>
          <p>Você montou em ${timer}s</p>

          <button id="btnContinuar">Continuar</button>
        </div>
      `;

      document.body.appendChild(overlay);

      document.getElementById("btnContinuar").onclick = function() {
        proximaImagem();
      };

    }, 300);
  }
}
function proximaImagem() {
  indiceAtual++;

  if (indiceAtual >= imagens.length) {
    indiceAtual = 0;
  }

  let overlay = document.querySelector(".overlay-final");
  if (overlay) overlay.remove();

  // 🔥 IMPORTANTE: limpa o puzzle totalmente
  puzzle.innerHTML = "";

  // 🔥 reinicia com pequeno delay (evita bug visual)
  setTimeout(() => {
    iniciar();
  }, 100);
}

iniciar();
</script>

</body>
</html>
