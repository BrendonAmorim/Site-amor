<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Nosso Momento ❤️</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: linear-gradient(to bottom, #ffd6e7, #ffeaf5);
}

/* CONTAINER */
.container {
    width: 420px;
    text-align: center;
    background: white;
    padding: 20px;
    border-radius: 20px;
}

/* BOTÃO */
button {
    padding: 10px 20px;
    border-radius: 10px;
    border: none;
    background: #4da6ff;
    color: white;
    cursor: pointer;
}

/* GRID */
#puzzle {
    width: 380px;
    height: 380px;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 2px;
}

/* PEÇAS */
.piece {
    background-size: 500% 500%;
    cursor: grab;
}
</style>
</head>

<body>

<div class="container">
  <h1>Monte nossa foto ❤️</h1>
  <div id="tempo">⏱️ 0s</div>
  <button onclick="iniciar()">🔄 Embaralhar</button>
  <div id="puzzle"></div>
</div>

<audio id="clickSound" src="click.mp3"></audio>
<audio id="winSound" src="win.mp3"></audio>

<script>
const puzzle = document.getElementById("puzzle");
const tempoEl = document.getElementById("tempo");

const imagens = [
  "foto1.jpg",
  "foto2.jpg",
  "foto3.jpg",
  "foto4.jpg",
  "foto5.jpg",
  "foto6.jpg",
  "foto7.jpg"
];

let indiceAtual = 0;
let size = 5;
let timer = 0;
let intervalo;

const clickSound = document.getElementById("clickSound");
const winSound = document.getElementById("winSound");

function iniciar() {
  puzzle.innerHTML = "";
  timer = 0;
  clearInterval(intervalo);

  intervalo = setInterval(() => {
    timer++;
    tempoEl.innerText = `⏱️ ${timer}s`;
  }, 1000);

  let imagemAtual = imagens[indiceAtual];
  let pieces = [];

  for (let i = 0; i < size * size; i++) {
    let piece = document.createElement("div");
    piece.className = "piece";

    let x = i % size;
    let y = Math.floor(i / size);

    piece.style.backgroundImage = `url(${imagemAtual})`;
    piece.style.backgroundPosition =
      `${(x * 100)/(size - 1)}% ${(y * 100)/(size - 1)}%`;

    piece.dataset.pos = i; // 🔥 posição correta

    piece.setAttribute("draggable", true);
    pieces.push(piece);
  }

  pieces.sort(() => Math.random() - 0.5);
  pieces.forEach(p => puzzle.appendChild(p));

  let dragged;

  document.querySelectorAll(".piece").forEach(piece => {

    piece.addEventListener("dragstart", () => dragged = piece);
    piece.addEventListener("dragover", e => e.preventDefault());

    piece.addEventListener("drop", () => {
      if (dragged !== piece) {

        clickSound.currentTime = 0;
        clickSound.play().catch(()=>{});

        // troca visual
        let temp = piece.style.backgroundPosition;
        piece.style.backgroundPosition = dragged.style.backgroundPosition;
        dragged.style.backgroundPosition = temp;

        // 🔥 troca lógica
        let tempPos = piece.dataset.pos;
        piece.dataset.pos = dragged.dataset.pos;
        dragged.dataset.pos = tempPos;

        verificar();
      }
    });

  });
}

function verificar() {
  let correta = true;

  document.querySelectorAll(".piece").forEach((piece, i) => {
    if (parseInt(piece.dataset.pos) !== i) {
      correta = false;
    }
  });

  if (correta) {
    clearInterval(intervalo);

    winSound.play().catch(()=>{});

    setTimeout(() => {
      let overlay = document.createElement("div");

      overlay.style.position = "fixed";
      overlay.style.inset = "0";
      overlay.style.background = "rgba(0,0,0,0.7)";
      overlay.style.display = "flex";
      overlay.style.justifyContent = "center";
      overlay.style.alignItems = "center";

      overlay.innerHTML = `
        <div style="background:white;padding:20px;border-radius:15px;text-align:center;">
          <h2>Você montou ❤️</h2>
          <p>Tempo: ${timer}s</p>
          <button id="btnContinuar">Próxima 📸</button>
        </div>
      `;

      document.body.appendChild(overlay);

      document.getElementById("btnContinuar").onclick = () => {
        overlay.remove();

        indiceAtual++;
        if (indiceAtual >= imagens.length) indiceAtual = 0;

        iniciar();
      };

    }, 200);
  }
}

iniciar();
</script>

</body>
</html>
